name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # Native .ts tests use --experimental-strip-types (Node 22.6+ only; not in Node 20).
        node-version: [22, 24]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: Install dependencies
        run: npm install

      # npm test = build + node test (same as local). Globs: `test/**/*.test.ts` alone
      # does not match files directly under test/ on Linux — include `test/*.test.ts`.
      - name: Build and test
        run: npm test
